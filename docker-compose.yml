services:
  web:
    build: .
    command: node src/web/server.js
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=production
      - WEB_PORT=4000
      - API_URL=http://api:5000
      - SESSION_SECRET=${SESSION_SECRET}
      - INTERNAL_JWT_SECRET=${INTERNAL_JWT_SECRET}
      - DATABASE_URL=${DATABASE_URL}
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  api:
    build: .
    command: node src/api/server.js
    # No published ports: the API is internal-only, reachable by the web
    # service over the compose network at http://api:5000.
    environment:
      - NODE_ENV=production
      - API_PORT=5000
      - INTERNAL_JWT_SECRET=${INTERNAL_JWT_SECRET}
      - DATABASE_URL=${DATABASE_URL}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
