name: Deploy

# Runs after a successful CI run on main. The self-hosted runner lives on the
# Linux server, so it can pull the new image and roll the containers in place.
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pull image and roll the deployment
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
          INTERNAL_JWT_SECRET: ${{ secrets.INTERNAL_JWT_SECRET }}
          TUNNEL_TOKEN: ${{ secrets.TUNNEL_TOKEN }}
        run: |
          cd deploy
          docker compose pull
          docker compose up -d --remove-orphans
          docker image prune -f
